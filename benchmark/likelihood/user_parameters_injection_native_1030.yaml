###### project ######

outputDir: "output_native_d1030Mpc"
nproc: 1

###### search ######

analysis: "2G"
cfg_search: "r"

optim: False

###### network configuration ######
ifo: ["L1", "H1"]
refIFO: "L1"

# lags
lagSize: 1
lagStep: 1.
lagOff: 0
lagMax: 0

# superlags
slagSize: 1 # number of super lags (simulation=1) - if slagSize=0 -> Standard Segments
slagMin: 0
slagMax: 0
slagOff: 0

# job
segLen: 1200
segMLS: 600
segTHR: 200
segEdge: 10

# frequency
fLow: 16.
fHigh: 1024.

levelR: 3
l_low: 4  # low frequency resolution level
l_high: 10  # high frequency resolution level

wdmXTalk: "wdmXTalk/OverlapCatalog16-1024.bin"

healpix: 7

###### cWB production thresholds & regulators ######

bpp: 0.001
subnet: 0.5
subcut: -1.0
netRHO: 5.0
cedRHO: 5.0
netCC: 0.5
Acore: 1.7
Tgap: 0.2
Fgap: 128.0
delta: 0.5
cfg_gamma: -1.0
LOUD: 300

pattern: 10

iwindow: 100

# simulation — runs all injections in a single segment
simulation: "all_inject_in_one_segment"
nfactor: 1

# Use the native (non-ROOT) pipeline workflow processor
segment_processer: ./data_generator_native.process_job_segment

injection:
  segment:
    start: 1126258862.4
    end: 1126260062.4
    noise:
      seeds: [1002, 1004]
  parameters:
    - mass1: 36
      mass2: 29
      spin1x: 0.3
      spin1z: 0.2
      spin2z: 0.1
      distance: 1030
      inclination: 0
      polarization: 0
      gps_time: 1126259162.4
      coa_phase: 0
      ra: 0
      dec: 0
      pol: 0
      f_lower: 16
      approximant: "IMRPhenomXPHM"
